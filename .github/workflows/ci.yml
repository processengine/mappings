name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Smoke test CLI — validate file
        run: node bin/mappings.js validate-file examples/mappings/client/normalize_client_data.v1.json --json

      - name: Smoke test CLI — compile
        run: node bin/mappings.js compile examples/mappings/client/normalize_client_data.v1.json --json

      - name: Smoke test CLI — run file with trace
        run: node bin/mappings.js run-file examples/mappings/client/normalize_client_data.v1.json --sources examples/sources/client_raw.json --trace

      - name: Smoke test CLI — validate directory
        run: node bin/mappings.js validate-dir examples

      - name: Smoke test CLI — list mappings
        run: node bin/mappings.js list examples/mappings

      - name: Verify package contents
        run: npm pack --json > pack-output.json

      - name: Upload packed artifact
        if: matrix.node == 22
        uses: actions/upload-artifact@v4
        with:
          name: npm-pack-node-${{ matrix.node }}
          path: |
            *.tgz
            pack-output.json
          if-no-files-found: error
